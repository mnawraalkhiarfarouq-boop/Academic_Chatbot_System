<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت كلية علوم الحاسوب - جامعة أم درمان الإسلامية</title>
    <style>
        :root {
            --primary-green: #006400; /* أخضر غامق ملكي */
            --accent-green: #28a745;  /* أخضر فاتح للتفاعل */
            --white: #ffffff;
            --bg-gray: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-gray); text-align: center; color: #333; margin: 0; padding: 20px; }
        .chat-container { width: 380px; margin: 40px auto; background: var(--white); border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid var(--primary-green); overflow: hidden; }
        .university-header { background-color: var(--bg-gray); padding: 15px; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logo { width: 60px; height: auto; } /* تأكد من رفع صورة شعار الجامعة باسم logo.png */
        .header-title h2 { color: var(--primary-green); margin: 0; font-size: 1.2rem; }
        .header-title p { color: #555; margin: 0; font-size: 0.9rem; }
        .chat-messages { height: 350px; padding: 15px; overflow-y: auto; background-color: #fafafa; }
        .input-area { padding: 10px; border-top: 1px solid #ddd; background: #eee; display: flex; gap: 5px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; font-size: 1rem; }
        button { padding: 12px 20px; background-color: var(--primary-green); color: var(--white); border: none; border-radius: 20px; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: var(--accent-green); }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="university-header">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="شعار جامعة أم درمان الإسلامية" class="logo">
            <div class="header-title">
                <h2>نظام المحادثة الذكي</h2>
                <p>كلية علوم الحاسوب وتقانة المعلومات</p>
            </div>
        </div>
        <div class="chat-messages">
            </div>
        <div class="input-area">
            <input type="text" placeholder="اسألني عن الجداول، النتائج، أو اللوائح...">
            <button>إرسال</button>
        </div>
    </div>
</body>
</html>
