<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوت كلية علوم الحاسوب</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; text-align: center; }
        .chat-box { width: 350px; margin: 50px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 10px; margin-top: 10px; }
        button { padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-box">
        <h3>مرحباً بك في نظام المحادثة الذكي</h3>
        <p>اسألني عن الجداول، النتائج أو اللوائح الأكاديمية.</p>
        <input type="text" placeholder="اكتب سؤالك هنا...">
        <button>إرسال</button>
    </div>
</body>
</html>
